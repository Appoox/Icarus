{% extends "base.html" %}
{% load static %}

{% block title %}Password Changed | ശാസ്ത്രഗതി{% endblock %}

{% block extra_css %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">

<style>
    .auth-page {
        max-width: 420px;
        margin: 80px auto;
        padding: 0 24px 80px;
        text-align: center;
    }

    .brand-header {
        margin-bottom: 32px;
    }

    .brand-logo {
        height: 80px;
        margin-bottom: 16px;
    }

    .auth-page h1 {
        font-family: 'Playfair Display', Georgia, serif;
        font-size: 32px;
        font-weight: 900;
        color: #0b1f3a;
        margin-bottom: 8px;
    }

    .status-card {
        background: #fafaf8;
        border: 1px solid #d4d0c8;
        border-radius: 8px;
        padding: 40px 32px;
        font-family: 'Source Sans 3', sans-serif;
    }

    .status-icon {
        font-size: 48px;
        color: #2e7d32;
        margin-bottom: 24px;
    }

    .status-text {
        font-size: 16px;
        color: #1a1612;
        line-height: 1.6;
        margin-bottom: 24px;
    }

    .auth-back {
        display: inline-block;
        padding: 12px 24px;
        font-family: 'Source Sans 3', sans-serif;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        background: #c8102e;
        color: #fff;
        border: none;
        border-radius: 4px;
        text-decoration: none;
        transition: all 0.15s;
    }

    .auth-back:hover {
        background: #a00d24;
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(200, 16, 46, 0.25);
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="brand-header">
        <img src="{% static 'images/KSSP_Logo.png' %}" alt="KSSP Logo" class="brand-logo">
        <h1>Password Changed</h1>
    </div>
    
    <div class="status-card">
        <div class="status-icon">✓</div>
        <p class="status-text">
            Your password has been successfully changed!
        </p>
        <a href="{% url 'reader_profile' %}" class="auth-back">Back to Profile</a>
    </div>
</div>
{% endblock %}
