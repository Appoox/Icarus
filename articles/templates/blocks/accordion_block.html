{% load wagtailcore_tags %}

<div class="accordion-block" id="accordion-{{ block.id|default:forloop.counter0 }}"
     data-multi="{{ self.allow_multiple_open|yesno:'true,false' }}">
    {% if self.title %}
        <h3 class="accordion-block__title">{{ self.title }}</h3>
    {% endif %}
    <div class="accordion-block__items">
        {% for item in self.items %}
            <div class="accordion-block__item" id="acc-item-{{ block.id|default:forloop.counter0 }}-{{ forloop.counter0 }}">
                <button
                    class="accordion-block__trigger"
                    aria-expanded="false"
                    aria-controls="acc-panel-{{ block.id|default:forloop.counter0 }}-{{ forloop.counter0 }}"
                >
                    <span>{{ item.heading }}</span>
                    <svg class="accordion-block__chevron" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/>
                    </svg>
                </button>
                <div
                    class="accordion-block__panel"
                    id="acc-panel-{{ block.id|default:forloop.counter0 }}-{{ forloop.counter0 }}"
                    role="region"
                    hidden
                >
                    <div class="accordion-block__panel-inner">
                        {{ item.content }}
                    </div>
                </div>
            </div>
        {% endfor %}
    </div>
</div>

<script>
(function () {
    const container = document.getElementById('accordion-{{ block.id|default:forloop.counter0 }}');
    if (!container) return;
    const multiOpen = container.dataset.multi === 'true';

    container.querySelectorAll('.accordion-block__trigger').forEach(btn => {
        btn.addEventListener('click', () => {
            const expanded = btn.getAttribute('aria-expanded') === 'true';

            if (!multiOpen) {
                // Close all others in this accordion
                container.querySelectorAll('.accordion-block__trigger').forEach(b => {
                    b.setAttribute('aria-expanded', 'false');
                    document.getElementById(b.getAttribute('aria-controls')).hidden = true;
                });
            }

            btn.setAttribute('aria-expanded', String(!expanded));
            document.getElementById(btn.getAttribute('aria-controls')).hidden = expanded;
        });
    });
})();
</script>

<style>
    .accordion-block {
        margin: 2.5rem 0;
        font-family: 'Source Sans 3', sans-serif;
    }

    .accordion-block__title {
        font-size: 1.2rem;
        font-weight: 700;
        color: #1a1a2e;
        margin: 0 0 1.25rem;
    }

    .accordion-block__items {
        border: 1px solid #eaecee;
        border-radius: 10px;
        overflow: hidden;
    }

    .accordion-block__item + .accordion-block__item {
        border-top: 1px solid #eaecee;
    }

    .accordion-block__trigger {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 1rem 1.25rem;
        background: #fff;
        border: none;
        text-align: left;
        font-family: inherit;
        font-size: 1rem;
        font-weight: 600;
        color: #2c3e50;
        cursor: pointer;
        transition: background 0.15s;
    }

    .accordion-block__trigger:hover {
        background: #fdf8f8;
    }

    .accordion-block__trigger[aria-expanded="true"] {
        background: #fdf2f2;
        color: #c0392b;
    }

    .accordion-block__trigger[aria-expanded="true"] .accordion-block__chevron {
        transform: rotate(180deg);
    }

    .accordion-block__chevron {
        width: 22px;
        height: 22px;
        fill: currentColor;
        flex-shrink: 0;
        transition: transform 0.25s ease;
    }

    .accordion-block__panel {
        background: #fafafa;
        border-top: 1px solid #eaecee;
    }

    .accordion-block__panel[hidden] {
        display: none;
    }

    .accordion-block__panel-inner {
        padding: 1rem 1.25rem;
        font-size: 0.97rem;
        line-height: 1.7;
        color: #444;
    }

    .accordion-block__panel-inner p:first-child { margin-top: 0; }
    .accordion-block__panel-inner p:last-child  { margin-bottom: 0; }
</style>
