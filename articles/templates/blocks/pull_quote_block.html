{% load wagtailcore_tags %}

<div class="pull-quote-block pull-quote-block--{{ self.alignment }}">
    <div class="pull-quote-block__inner">
        <span class="pull-quote-block__mark" aria-hidden="true">&ldquo;</span>
        <blockquote class="pull-quote-block__text">{{ self.quote }}</blockquote>
        {% if self.attribution %}
            <cite class="pull-quote-block__attribution">— {{ self.attribution }}</cite>
        {% endif %}
    </div>
</div>

<style>
    .pull-quote-block {
        margin: 2.5rem 0;
        font-family: 'Source Sans 3', sans-serif;
    }

    /* Centre: full-width, visually dominant */
    .pull-quote-block--center .pull-quote-block__inner {
        text-align: center;
        padding: 2rem 3rem;
        border-top: 3px solid #c0392b;
        border-bottom: 3px solid #c0392b;
    }

    /* Left/right float insets */
    .pull-quote-block--left {
        float: left;
        width: 42%;
        margin: 0.5rem 2.5rem 1.5rem 0;
    }
    .pull-quote-block--right {
        float: right;
        width: 42%;
        margin: 0.5rem 0 1.5rem 2.5rem;
    }
    .pull-quote-block--left .pull-quote-block__inner,
    .pull-quote-block--right .pull-quote-block__inner {
        padding: 1.5rem 0;
        border-left: 4px solid #c0392b;
        padding-left: 1.25rem;
    }

    .pull-quote-block__mark {
        display: block;
        font-size: 5rem;
        line-height: 0.6;
        color: #c0392b;
        font-family: Georgia, serif;
        margin-bottom: 0.75rem;
        opacity: 0.8;
    }

    .pull-quote-block--left .pull-quote-block__mark,
    .pull-quote-block--right .pull-quote-block__mark {
        font-size: 3.5rem;
    }

    .pull-quote-block__text {
        font-size: 1.45rem;
        font-weight: 600;
        line-height: 1.45;
        color: #1a1a2e;
        margin: 0 0 0.75rem 0;
        font-style: italic;
    }

    .pull-quote-block--left .pull-quote-block__text,
    .pull-quote-block--right .pull-quote-block__text {
        font-size: 1.15rem;
    }

    .pull-quote-block__attribution {
        font-size: 0.9rem;
        color: #7f8c8d;
        font-weight: 600;
        font-style: normal;
        letter-spacing: 0.03em;
        text-transform: uppercase;
    }

    /* clear floats after floated pull quotes */
    .pull-quote-block--left::after,
    .pull-quote-block--right::after {
        content: "";
        display: table;
        clear: both;
    }

    @media (max-width: 640px) {
        .pull-quote-block--left,
        .pull-quote-block--right {
            float: none;
            width: 100%;
            margin: 2rem 0;
        }
    }
</style>
