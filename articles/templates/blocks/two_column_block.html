{% load wagtailcore_tags %}

<div class="two-column-block two-column-block--{{ self.split|slugify }}">
    <div class="two-column-block__left">
        {{ self.left_column }}
    </div>
    <div class="two-column-block__right">
        {{ self.right_column }}
    </div>
</div>

<style>
    .two-column-block {
        margin: 2.5rem 0;
        display: grid;
        gap: 2.5rem;
        font-family: 'Source Sans 3', sans-serif;
        align-items: start;
    }

    /* Split ratios */
    .two-column-block--50-50 { grid-template-columns: 1fr 1fr; }
    .two-column-block--60-40 { grid-template-columns: 3fr 2fr; }
    .two-column-block--40-60 { grid-template-columns: 2fr 3fr; }
    .two-column-block--70-30 { grid-template-columns: 7fr 3fr; }
    .two-column-block--30-70 { grid-template-columns: 3fr 7fr; }

    .two-column-block__left,
    .two-column-block__right {
        min-width: 0; /* prevent grid blowout */
    }

    .two-column-block p { margin-top: 0; }

    @media (max-width: 680px) {
        .two-column-block {
            grid-template-columns: 1fr !important;
            gap: 1.5rem;
        }
    }
</style>
